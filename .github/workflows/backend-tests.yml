name: Backend Unit and Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit and integration tests with coverage
        env:
          DB_NAME: test_db
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASS: postgres
          AMADEUS_KEY: test
          AMADEUS_SECRET: test
          OFFERS_TTL_MINUTES: '30'
          XOTELO_RAPIDAPI_KEY: test
          XOTELO_RAPIDAPI_HOST: test
          JWT_SECRET_KEY: super-secret-test-key
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: '120'
        run: |
          pytest tests/unit tests/integration --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
