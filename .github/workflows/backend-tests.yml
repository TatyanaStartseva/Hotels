name: Backend Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    env:
      DB_NAME: test_db
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASS: postgres
      AMADEUS_KEY: test
      AMADEUS_SECRET: test
      OFFERS_TTL_MINUTES: '30'
      XOTELO_RAPIDAPI_KEY: test
      XOTELO_RAPIDAPI_HOST: test
      JWT_SECRET_KEY: super-secret-test-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: '120'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        run: |
          pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage.xml

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    env:
      DB_NAME: test_db
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASS: postgres
      AMADEUS_KEY: test
      AMADEUS_SECRET: test
      OFFERS_TTL_MINUTES: '30'
      XOTELO_RAPIDAPI_KEY: test
      XOTELO_RAPIDAPI_HOST: test
      JWT_SECRET_KEY: super-secret-test-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: '120'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run integration tests
        run: |
          pytest tests/integration -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: coverage.xml