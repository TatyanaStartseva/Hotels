name: E2E System Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      AMADEUS_KEY: test
      AMADEUS_SECRET: test
      OFFERS_TTL_MINUTES: 30
      XOTELO_RAPIDAPI_KEY: test
      XOTELO_RAPIDAPI_HOST: test
      JWT_SECRET_KEY: super-secret-test-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hotels-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: hotels-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: hotels-frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: hotels-frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: hotels-frontend/playwright-report